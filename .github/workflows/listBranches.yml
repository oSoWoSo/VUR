name: List Branches

on:
  push:
    branches:
      - '*'
  pull_request:
    branches:
      - '*'
  workflow_dispatch:

jobs:
  list-branches:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: List branches
        run: |
          rm -f .github/branchList
          git branch -a | sed 's/origin\///' | sort | tee -a .github/branchList

      - name: "Push results"
        run: |
          git config --global user.name "web-flow"
          git config --global user.email "noreply@github.com"
          git status
          git add --all
          git commit -m "Update supported"
          git push
          git status
